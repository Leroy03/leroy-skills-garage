version: 1
principles:
  - think_before_coding
  - simplicity_first
  - surgical_changes
  - goal_driven_execution
  - grade_before_process
  - verify_with_evidence
  - handoff_with_structure
defaults:
  response_style:
    concise: true
    evidence_first: true
  file_encoding:
    text: utf-8
    bom: false
  handoff_schema:
    - objective
    - in_scope
    - out_of_scope
    - dependencies
    - risks
    - acceptance_criteria
    - verification
grades:
  "⚪":
    level: L0
    alias: direct
    process: direct_answer
    required_skills: []
    verification: minimal_if_needed
  "🟢":
    level: L1
    alias: minimal
    process: minimal_execution
    required_skills:
      - karpathy-guidelines
    optional_skills:
      - knowledge-keeper
      - context-builder
      - tdd-lite
      - verification-before-completion
    verification: direct_evidence
  "🟡":
    level: L2
    alias: planned
    process: planned_and_reviewed
    required_skills:
      - entry-router
      - karpathy-guidelines
      - task-planner
    optional_skills:
      - solution-designer
      - context-builder
      - tdd-lite
      - code-reviewer
      - qa-gatekeeper
      - verification-before-completion
    verification: reviewed_approval
  "🔴":
    level: L3
    alias: formal
    process: governed_delivery
    required_skills:
      - entry-router
      - karpathy-guidelines
      - devflow-marshal
    verification: state_machine_and_artifacts
routing_axes:
  scope:
    - read_only
    - single_file
    - multi_file
    - cross_system
  risk:
    - low
    - medium
    - high
  ambiguity:
    - low
    - medium
    - high
  governance:
    - none
    - review_needed
    - formal_required
roles:
  entry-router:
    produces:
      - level
      - grade
      - grade_alias
      - recommended_skills
      - required_checks
      - stop_point
  karpathy-guidelines:
    produces:
      - assumptions
      - simplest_viable_path
      - scope_guardrails
      - verification_goal
  context-builder:
    produces:
      - core_files
      - dependencies
      - impact_scope
      - risk_level
      - test_files
  pragmatic-coder:
    consumes:
      - core_files
      - dependencies
      - risk_level
    produces:
      - changed_files
      - key_changes
      - validation_steps
  bug-hunter:
    consumes:
      - entry_points
      - related_files
      - logs
    produces:
      - root_cause
      - solutions
      - verification_plan
  code-reviewer:
    consumes:
      - changed_files
      - impact_scope
      - risk_level
    produces:
      - issues
      - recommendations
  code-optimizer:
    consumes:
      - target_scope
      - constraints
    produces:
      - issue_list
      - minimal_change_plan
      - verification_checklist
  verification-before-completion:
    consumes:
      - validation_steps
      - test_results
      - review_findings
    produces:
      - evidence
      - residual_risks
      - completion_decision
  tdd-lite:
    consumes:
      - target_behaviors
      - risk_level
      - available_test_framework
    produces:
      - test_strategy
      - new_or_updated_tests
      - evidence
rules:
  - Do not expand scope without explicit justification.
  - Use repository paths and symbols in outputs whenever possible.
  - Separate facts, assumptions, and recommendations.
  - If a dependency or document is missing, report it before proceeding.
  - Start non-trivial work by selecting the lightest valid grade.
  - Prefer explicit level labels L0-L3 when routing across different model vendors.
  - Prefer guardrails first, then workflow, then implementation.
  - Use tdd-lite only when it materially reduces regression risk.
  - Default all text and code files to UTF-8 without BOM unless the target file already requires another encoding.
